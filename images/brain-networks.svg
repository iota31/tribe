<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 360" width="920" height="360" style="background:#0a0e14; border-radius:12px;">
  <text x="460.0" y="28" font-size="17" fill="#e6edf3" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="middle" dominant-baseline="middle" font-weight="600">Yeo 2011 — 7 Functional Brain Networks</text>
  <text x="460.0" y="50" font-size="11" fill="#7d8590" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="middle" dominant-baseline="middle">TRIBE v2 maps 20,484 cortical vertices into 7 networks — emotional vs rational drives manipulation</text>
  <text x="30" y="94.0" font-size="11" fill="#fca5a5" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="start" dominant-baseline="middle" font-weight="600">Salience</text>
  <rect x="140" y="80" width="320" height="28" fill="#131920" rx="4" stroke="#1e2832" stroke-width="1" />
  <rect x="140" y="80" width="146" height="28" fill="#ef4444" rx="4" stroke="none" stroke-width="0" />
  <text x="468" y="94.0" font-size="10" fill="#7d8590" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="start" dominant-baseline="middle">0.011</text>
  <text x="140" y="112" font-size="9" fill="#4b5563" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="start" dominant-baseline="middle">⚠ Threat detection · Rapid emotional response</text>
  <text x="30" y="128.0" font-size="11" fill="#fca5a5" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="start" dominant-baseline="middle" font-weight="600">Default Mode</text>
  <rect x="140" y="114" width="320" height="28" fill="#131920" rx="4" stroke="#1e2832" stroke-width="1" />
  <rect x="140" y="114" width="119" height="28" fill="#f97316" rx="4" stroke="none" stroke-width="0" />
  <text x="468" y="128.0" font-size="10" fill="#7d8590" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="start" dominant-baseline="middle">0.009</text>
  <text x="140" y="146" font-size="9" fill="#4b5563" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="start" dominant-baseline="middle">💭 Self-referential · Social cognition</text>
  <text x="30" y="162.0" font-size="11" fill="#fca5a5" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="start" dominant-baseline="middle" font-weight="600">Limbic</text>
  <rect x="140" y="148" width="320" height="28" fill="#131920" rx="4" stroke="#1e2832" stroke-width="1" />
  <rect x="140" y="148" width="53" height="28" fill="#fbbf24" rx="4" stroke="none" stroke-width="0" />
  <text x="468" y="162.0" font-size="10" fill="#7d8590" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="start" dominant-baseline="middle">0.004</text>
  <text x="140" y="180" font-size="9" fill="#4b5563" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="start" dominant-baseline="middle">❤️ Emotional memory · Goal-driven</text>
  <text x="30" y="196.0" font-size="11" fill="#9ca3af" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="start" dominant-baseline="middle">Dorsal Attention</text>
  <rect x="140" y="182" width="320" height="28" fill="#131920" rx="4" stroke="#1e2832" stroke-width="1" />
  <rect x="140" y="182" width="320" height="28" fill="#06b6d4" rx="4" stroke="none" stroke-width="0" />
  <text x="468" y="196.0" font-size="10" fill="#7d8590" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="start" dominant-baseline="middle">0.024</text>
  <text x="140" y="214" font-size="9" fill="#4b5563" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="start" dominant-baseline="middle">👁️ Top-down focus · Voluntary attention</text>
  <text x="30" y="230.0" font-size="11" fill="#9ca3af" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="start" dominant-baseline="middle">Executive Control</text>
  <rect x="140" y="216" width="320" height="28" fill="#131920" rx="4" stroke="#1e2832" stroke-width="1" />
  <rect x="140" y="216" width="66" height="28" fill="#3b82f6" rx="4" stroke="none" stroke-width="0" />
  <text x="468" y="230.0" font-size="10" fill="#7d8590" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="start" dominant-baseline="middle">0.005</text>
  <text x="140" y="248" font-size="9" fill="#4b5563" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="start" dominant-baseline="middle">🧠 Problem solving · Rational evaluation</text>
  <text x="30" y="264.0" font-size="11" fill="#9ca3af" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="start" dominant-baseline="middle">Somatomotor</text>
  <rect x="140" y="250" width="320" height="28" fill="#131920" rx="4" stroke="#1e2832" stroke-width="1" />
  <rect x="140" y="250" width="13" height="28" fill="#6b7280" rx="4" stroke="none" stroke-width="0" />
  <text x="468" y="264.0" font-size="10" fill="#7d8590" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="start" dominant-baseline="middle">0.001</text>
  <text x="140" y="282" font-size="9" fill="#4b5563" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="start" dominant-baseline="middle">🤲 Motor control · Interoception</text>
  <text x="30" y="298.0" font-size="11" fill="#9ca3af" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="start" dominant-baseline="middle">Visual</text>
  <rect x="140" y="284" width="320" height="28" fill="#131920" rx="4" stroke="#1e2832" stroke-width="1" />
  <rect x="140" y="284" width="266" height="28" fill="#9ca3af" rx="4" stroke="none" stroke-width="0" />
  <text x="468" y="298.0" font-size="10" fill="#7d8590" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="start" dominant-baseline="middle">0.020</text>
  <text x="140" y="316" font-size="9" fill="#4b5563" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="start" dominant-baseline="middle">👁️ Visual processing</text>
  <rect x="510" y="90" width="180" height="110" fill="#1f0a0a" rx="8" stroke="#ef4444" stroke-width="1.5" />
  <text x="600" y="110" font-size="11" fill="#ef4444" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="middle" dominant-baseline="middle" font-weight="600">EMOTIONAL NETWORKS</text>
  <text x="600" y="132" font-size="10" fill="#9ca3af" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="middle" dominant-baseline="middle">Activated during emotional</text>
  <text x="600" y="147" font-size="10" fill="#9ca3af" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="middle" dominant-baseline="middle">processing and threat detection.</text>
  <text x="600" y="170" font-size="10" fill="#fca5a5" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="middle" dominant-baseline="middle">High activation = manipulation</text>
  <text x="600" y="185" font-size="10" fill="#fca5a5" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="middle" dominant-baseline="middle">signal (ratio goes up)</text>
  <rect x="510" y="215" width="180" height="110" fill="#0a1a1f" rx="8" stroke="#3b82f6" stroke-width="1.5" />
  <text x="600" y="235" font-size="11" fill="#3b82f6" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="middle" dominant-baseline="middle" font-weight="600">RATIONAL NETWORKS</text>
  <text x="600" y="257" font-size="10" fill="#9ca3af" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="middle" dominant-baseline="middle">Activated during analytical</text>
  <text x="600" y="272" font-size="10" fill="#9ca3af" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="middle" dominant-baseline="middle">thinking and evaluation.</text>
  <text x="600" y="295" font-size="10" fill="#93c5fd" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="middle" dominant-baseline="middle">High activation = lower</text>
  <text x="600" y="310" font-size="10" fill="#93c5fd" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="middle" dominant-baseline="middle">manipulation ratio</text>
  <rect x="730" y="110" width="170" height="200" fill="#0d1117" rx="8" stroke="#30363d" stroke-width="1" />
  <text x="815" y="135" font-size="13" fill="#e6edf3" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="middle" dominant-baseline="middle" font-weight="600">Manipulation Ratio</text>
  <text x="815" y="165" font-size="10" fill="#9ca3af" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="middle" dominant-baseline="middle">Salience + Limbic + Default</text>
  <text x="815" y="180" font-size="10" fill="#30363d" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="middle" dominant-baseline="middle">─────────────────</text>
  <text x="815" y="195" font-size="10" fill="#9ca3af" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="middle" dominant-baseline="middle">Exec + Dorsal Attention</text>
  <text x="815" y="218" font-size="20" fill="#f59e0b" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="middle" dominant-baseline="middle" font-weight="600">= 0.63</text>
  <text x="815" y="240" font-size="9" fill="#6b7280" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="middle" dominant-baseline="middle">Ratio &gt; 1.0 = emotional dominant</text>
  <text x="815" y="255" font-size="9" fill="#6b7280" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="middle" dominant-baseline="middle">Ratio &lt; 1.0 = rational dominant</text>
  <text x="815" y="275" font-size="10" fill="#f59e0b" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="middle" dominant-baseline="middle">Fear appeal example: 0.63</text>
  <text x="815" y="292" font-size="9" fill="#6b7280" font-family="ui-monospace,SFMono,Menlo,monospace" text-anchor="middle" dominant-baseline="middle">(Salience barely above rational)</text>
</svg>