name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint dependencies
        run: pip install -e ".[lint]"

      - name: Ruff lint
        run: ruff check tribe/ tests/

      - name: Ruff format check
        run: ruff format --check tribe/ tests/

  test:
    needs: [lint]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install --extra-index-url https://download.pytorch.org/whl/cpu -e ".[dev,bench]"

      - name: Run tests
        run: python -m pytest tests/ -q
